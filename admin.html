<script>
"use strict";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------- PROTEKSI HALAMAN: WAJIB LOGIN ---------- */
(async function guardAdminPage(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){
    window.location.href = 'login.html';
    return;
  }
  enterDashboard();
})();

/* Jika sesi berakhir/di-invalidate (mis. logout dari tab lain), lempar ke login.html */
sb.auth.onAuthStateChange((event) => {
  if(event === 'SIGNED_OUT'){
    window.location.href = 'login.html';
  }
});

/* ---------- TOAST ---------- */
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('opacity-0'); t.classList.add('opacity-100');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.classList.add('opacity-0'); t.classList.remove('opacity-100'); }, 2500);
}
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- SCREEN HELPERS ---------- */

function enterDashboard(){
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  buildTabs();
  loadTab('settings');
}
/* ---------- LOGOUT ---------- */
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.href = 'login.html';
});
/* ---------- TABS ---------- */
const TABS = [
  { key:'settings',   label:'Teks Utama', icon:'fa-font' },
  { key:'banners',    label:'Banner',     icon:'fa-images' },
  { key:'sponsors',   label:'Sponsor',    icon:'fa-handshake' },
  { key:'committees', label:'Panitia',    icon:'fa-user-tie' },
  { key:'groups',     label:'Grup & Tim', icon:'fa-users' },
  { key:'matches',    label:'Jadwal Grup',icon:'fa-clipboard-list' },
  { key:'bracket',    label:'Babak Gugur',icon:'fa-trophy' },
  { key:'gallery',    label:'Galeri Foto',icon:'fa-images' },
];
function buildTabs(){
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = nav.innerHTML.split('<!-- tabs injected by JS -->')[0] + '<!-- tabs injected by JS -->' + TABS.map(t => `
    <button data-tab="${t.key}" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-bold text-white/60 hover:text-white hover:bg-white/5 border-l-4 border-transparent text-left transition-colors">
      <i class="fa-solid ${t.icon} w-4 text-center"></i>${t.label}
    </button>
  `).join('');
  nav.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      loadTab(btn.getAttribute('data-tab'));
      closeSidebar();
    });
  });
}
function setActiveTab(key){
  document.querySelectorAll('.tab-btn').forEach(b => {
    const active = b.getAttribute('data-tab') === key;
    b.classList.toggle('text-white', active);
    b.classList.toggle('bg-white/10', active);
    b.classList.toggle('border-yellow-500', active);
    b.classList.toggle('text-white/60', !active);
  });
}
function openSidebar(){
  document.getElementById('sidebarNav').classList.remove('-translate-x-full');
  document.getElementById('sidebarOverlay').classList.remove('hidden');
}
function closeSidebar(){
  if(window.innerWidth >= 768) return;
  document.getElementById('sidebarNav').classList.add('-translate-x-full');
  document.getElementById('sidebarOverlay').classList.add('hidden');
}
document.getElementById('sidebarToggleBtn').addEventListener('click', () => {
  const nav = document.getElementById('sidebarNav');
  nav.classList.contains('-translate-x-full') ? openSidebar() : closeSidebar();
});
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
function loadTab(key){
  setActiveTab(key);
  const map = { settings:renderSettingsTab, banners:renderBannersTab, sponsors:renderSponsorsTab,
    committees:renderCommitteesTab, groups:renderGroupsTab, matches:renderMatchesTab, bracket:renderBracketTab,
    gallery:renderGalleryTab };
  map[key]();
}

/* ---------- IMAGE UPLOAD HELPER ---------- */
let uploadResolver = null;
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if(!file || !uploadResolver) return;
  const resolve = uploadResolver; uploadResolver = null;
  const path = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`;
  showToast('Mengunggah foto...');
  const { error } = await sb.storage.from('media').upload(path, file, { upsert:true });
  if(error){ showToast('Gagal upload: ' + error.message); resolve(null); return; }
  const { data } = sb.storage.from('media').getPublicUrl(path);
  showToast('Foto berhasil diunggah');
  resolve(data.publicUrl);
});
function pickImage(){
  return new Promise(resolve => {
    uploadResolver = resolve;
    document.getElementById('fileInput').click();
  });
}

/* ---------- GENERIC SAFE QUERY ---------- */
async function q(promise, okMsg){
  const { data, error } = await promise;
  if(error){ showToast('Error: ' + error.message); return null; }
  if(okMsg) showToast(okMsg);
  return data;
}

/* =====================================================================
   TAB 1: TEKS UTAMA (site_settings)
===================================================================== */
async function renderSettingsTab(){
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="card p-5 shadow"><p class="text-sm text-slate-400">Memuat...</p></div>`;
  const rows = await q(sb.from('site_settings').select('*').order('key'));
  if(!rows) return;
  main.innerHTML = `
    <div class="card p-5 md:p-6 shadow">
      <h2 class="font-bold text-lg mb-1">Teks Utama Halaman</h2>
      <p class="text-sm text-slate-500 mb-5">Teks ini muncul di bagian hero / banner halaman utama.</p>
      <div class="space-y-4" id="settingsList">
        ${rows.map(r => `
          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase">${esc(r.key)}</label>
            <div class="flex gap-2 mt-1">
              <input data-key="${esc(r.key)}" value="${esc(r.value)}" class="flex-1 px-3 py-2.5 rounded-lg border border-slate-200 focus:border-blue-500 outline-none text-sm">
              ${/photo|image/i.test(r.key) ? `<button class="setting-upload-btn shrink-0 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold px-3 rounded-lg" data-key="${esc(r.key)}"><i class="fa-solid fa-upload"></i></button>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      <button id="saveSettingsBtn" class="mt-5 bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-5 py-2.5 rounded-lg">
        <i class="fa-solid fa-floppy-disk mr-2"></i>Simpan Semua Teks
      </button>
      <div class="mt-5 border-t border-slate-100 pt-4">
        <p class="text-xs text-slate-400 mb-2">
          Tambah kunci baru jika belum ada di daftar atas, contoh: <code>hero_title_main</code>, <code>hero_title_accent</code>, <code>mvp_name</code>, <code>mvp_photo_url</code>, <code>mvp_team_name</code>, <code>mvp_note</code>.
        </p>
        <div class="flex flex-wrap gap-2">
          <input id="newSettingKey" placeholder="Nama kunci, mis. mvp_name" class="flex-1 min-w-[160px] px-3 py-2 rounded-lg border border-slate-200 text-sm">
          <input id="newSettingValue" placeholder="Isi teks / URL" class="flex-1 min-w-[160px] px-3 py-2 rounded-lg border border-slate-200 text-sm">
          <button id="addSettingBtn" class="bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-lg"><i class="fa-solid fa-plus mr-1"></i>Tambah</button>
        </div>
      </div>
    </div>
  `;
  document.querySelectorAll('.setting-upload-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const key = btn.getAttribute('data-key');
      const url = await pickImage();
      if(url){
        document.querySelector(`#settingsList input[data-key="${key}"]`).value = url;
        await q(sb.from('site_settings').update({ value:url }).eq('key', key), 'Foto disimpan');
      }
    });
  });
  document.getElementById('addSettingBtn').addEventListener('click', async () => {
    const key = document.getElementById('newSettingKey').value.trim();
    const value = document.getElementById('newSettingValue').value.trim();
    if(!key){ showToast('Isi nama kunci terlebih dahulu'); return; }
    await q(sb.from('site_settings').upsert({ key, value }, { onConflict:'key' }), 'Kunci baru ditambahkan');
    renderSettingsTab();
  });
  document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
    const inputs = document.querySelectorAll('#settingsList input[data-key]');
    for(const inp of inputs){
      await sb.from('site_settings').update({ value: inp.value }).eq('key', inp.getAttribute('data-key'));
    }
    showToast('Teks berhasil disimpan');
  });
}

/* =====================================================================
   TAB 2: BANNER SLIDER
===================================================================== */
async function renderBannersTab(){
  const main = document.getElementById('mainContent');
  const rows = await q(sb.from('banners').select('*').order('sort_order')) || [];
  main.innerHTML = `
    <div class="card p-5 md:p-6 shadow mb-4">
      <h2 class="font-bold text-lg mb-1">Banner Slider</h2>
      <p class="text-sm text-slate-500 mb-5">Gambar akan tampil bergantian di halaman utama. Urutan berdasarkan angka urut.</p>
      <div class="space-y-3" id="bannerList">
        ${rows.map(b => bannerRowHtml(b)).join('') || '<p class="text-sm text-slate-400">Belum ada banner.</p>'}
      </div>
      <button id="addBannerBtn" class="mt-4 border-2 border-dashed border-slate-200 hover:border-blue-400 text-slate-500 hover:text-blue-600 font-bold text-sm px-5 py-2.5 rounded-lg w-full">
        <i class="fa-solid fa-plus mr-2"></i>Tambah Banner
      </button>
    </div>
  `;
  bindBannerEvents();
  document.getElementById('addBannerBtn').addEventListener('click', async () => {
    await q(sb.from('banners').insert({ image_url:'', caption_sub:'', caption_main:'', sort_order:(rows.length+1), active:true }), 'Banner ditambahkan');
    renderBannersTab();
  });
}
function bannerRowHtml(b){
  return `
    <div class="border border-slate-200 rounded-xl p-4 flex flex-col md:flex-row gap-3 md:items-center" data-id="${b.id}">
      <div class="w-full md:w-32 h-20 rounded-lg bg-slate-100 overflow-hidden shrink-0 cursor-pointer banner-img" title="Klik untuk unggah gambar">
        ${b.image_url ? `<img src="${esc(b.image_url)}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-image text-xl"></i></div>`}
      </div>
      <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-2">
        <input class="b-sub px-3 py-2 rounded-lg border border-slate-200 text-sm" placeholder="Sub caption" value="${esc(b.caption_sub)}">
        <input class="b-main px-3 py-2 rounded-lg border border-slate-200 text-sm" placeholder="Caption utama" value="${esc(b.caption_main)}">
        <input class="b-order px-3 py-2 rounded-lg border border-slate-200 text-sm" type="number" placeholder="Urutan" value="${b.sort_order ?? 0}">
        <label class="flex items-center gap-2 text-sm px-1"><input type="checkbox" class="b-active" ${b.active ? 'checked':''}> Aktif</label>
      </div>
      <div class="flex gap-2 shrink-0">
        <button class="b-save bg-blue-600 text-white text-xs font-bold px-3 py-2 rounded-lg"><i class="fa-solid fa-check"></i></button>
        <button class="b-del bg-red-50 text-red-500 text-xs font-bold px-3 py-2 rounded-lg"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
  `;
}
function bindBannerEvents(){
  document.querySelectorAll('#bannerList > div').forEach(row => {
    const id = row.getAttribute('data-id');
    row.querySelector('.banner-img').addEventListener('click', async () => {
      const url = await pickImage();
      if(url){ await q(sb.from('banners').update({ image_url:url }).eq('id', id), 'Gambar disimpan'); renderBannersTab(); }
    });
    row.querySelector('.b-save').addEventListener('click', async () => {
      await q(sb.from('banners').update({
        caption_sub: row.querySelector('.b-sub').value,
        caption_main: row.querySelector('.b-main').value,
        sort_order: Number(row.querySelector('.b-order').value) || 0,
        active: row.querySelector('.b-active').checked
      }).eq('id', id), 'Banner disimpan');
    });
    row.querySelector('.b-del').addEventListener('click', async () => {
      if(!confirm('Hapus banner ini?')) return;
      await q(sb.from('banners').delete().eq('id', id), 'Banner dihapus');
      renderBannersTab();
    });
  });
}

  <h2 class="font-bold text-lg">Grup &amp; Tim</h2>
  <div class="flex gap-2">
    <button id="cleanEmptyBtn" class="bg-red-50 hover:bg-red-100 text-red-500 text-xs font-bold px-4 py-2 rounded-lg"><i class="fa-solid fa-broom mr-1"></i>Hapus Tim Kosong</button>
    <button id="addGroupBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded-lg"><i class="fa-solid fa-plus mr-1"></i>Grup Baru</button>
  </div>
</div>
      <div class="space-y-6" id="groupsWrap"></div>
    </div>
  `;
  const wrap = document.getElementById('groupsWrap');
  if(groups.length === 0){
    wrap.innerHTML = '<p class="text-sm text-slate-400">Belum ada grup. Klik "Grup Baru" untuk membuat.</p>';
  }
  groups.forEach(g => {
    const gTeams = teams.filter(t => t.group_id === g.id);
    const section = document.createElement('div');
    section.className = 'border border-slate-200 rounded-xl p-4';
    section.innerHTML = `
      <div class="flex flex-wrap gap-2 items-center mb-3">
        <input class="g-name px-3 py-2 rounded-lg border border-slate-200 text-sm font-bold w-32" value="${esc(g.name)}">
        <input class="g-date px-3 py-2 rounded-lg border border-slate-200 text-sm" type="date" value="${g.match_date ?? ''}">
        <input class="g-race px-3 py-2 rounded-lg border border-slate-200 text-sm w-24" type="number" min="1" value="${g.race_to ?? 2}" title="Race to">
        <span class="text-[11px] text-slate-400 font-semibold">Lolos:</span>
        <input class="g-qualify px-3 py-2 rounded-lg border border-slate-200 text-sm w-20" type="number" min="1" value="${g.qualify_count ?? 2}" title="Jumlah Tim Lolos">
        <button class="g-save bg-blue-600 text-white text-xs font-bold px-3 py-2 rounded-lg"><i class="fa-solid fa-check"></i> Simpan Grup</button>
        <button class="g-del bg-red-50 text-red-500 text-xs font-bold px-3 py-2 rounded-lg ml-auto"><i class="fa-solid fa-trash"></i> Hapus Grup</button>
      </div>
      <div class="space-y-2 team-list">
        ${gTeams.map(t => `
          <div class="flex flex-wrap gap-2 items-center bg-slate-50 rounded-lg p-2" data-id="${t.id}">
            <div class="t-img w-10 h-10 rounded-full bg-slate-100 overflow-hidden shrink-0 cursor-pointer" title="Klik untuk unggah foto tim/pemain">
              ${t.photo_url ? `<img src="${esc(t.photo_url)}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-user text-xs"></i></div>`}
            </div>
            <input class="t-name px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[120px]" placeholder="Nama tim" value="${esc(t.name)}">
            <input class="t-p1 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[100px]" placeholder="Pemain 1" value="${esc(t.player1)}">
            <input class="t-p2 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[100px]" placeholder="Pemain 2" value="${esc(t.player2)}">
            <button class="t-save bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-check"></i></button>
            <button class="t-del bg-red-50 text-red-500 text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-trash"></i></button>
          </div>
        `).join('')}
      </div>
      <button class="add-team-btn mt-2 text-blue-600 text-xs font-bold"><i class="fa-solid fa-plus mr-1"></i>Tambah Tim</button>
    `;
    wrap.appendChild(section);

   section.querySelector('.g-save').addEventListener('click', async () => {
      await q(sb.from('groups').update({
        name: section.querySelector('.g-name').value,
        match_date: section.querySelector('.g-date').value || null,
        race_to: Number(section.querySelector('.g-race').value) || 2,
        qualify_count: Number(section.querySelector('.g-qualify').value) || 2
      }).eq('id', g.id), 'Grup disimpan');
    });
    section.querySelector('.g-del').addEventListener('click', async () => {
      if(!confirm(`Hapus ${g.name}? Semua tim di dalamnya juga akan dilepas dari grup.`)) return;
      await q(sb.from('groups').delete().eq('id', g.id), 'Grup dihapus');
      renderGroupsTab();
    });
    section.querySelector('.add-team-btn').addEventListener('click', async () => {
      await q(sb.from('teams').insert({ group_id:g.id, name:'Tim Baru', sort_order:(gTeams.length+1) }), 'Tim ditambahkan');
      renderGroupsTab();
    });
    section.querySelectorAll('.team-list > div').forEach(row => {
      const tid = row.getAttribute('data-id');
      row.querySelector('.t-img').addEventListener('click', async () => {
        const url = await pickImage();
        if(url){ await q(sb.from('teams').update({ photo_url:url }).eq('id', tid), 'Foto tim disimpan'); renderGroupsTab(); }
      });
      row.querySelector('.t-save').addEventListener('click', async () => {
        await q(sb.from('teams').update({
          name: row.querySelector('.t-name').value,
          player1: row.querySelector('.t-p1').value,
          player2: row.querySelector('.t-p2').value
        }).eq('id', tid), 'Tim disimpan');
      });
      row.querySelector('.t-del').addEventListener('click', async () => {
        if(!confirm('Hapus tim ini?')) return;
        await q(sb.from('teams').delete().eq('id', tid), 'Tim dihapus');
        renderGroupsTab();
      });
    });
  });
  document.getElementById('addGroupBtn').addEventListener('click', async () => {
    await q(sb.from('groups').insert({ name:`GRUP ${groups.length+1}`, race_to:2, sort_order:(groups.length+1) }), 'Grup ditambahkan');
    renderGroupsTab();
  });
document.getElementById('cleanEmptyBtn').addEventListener('click', async () => {
  const emptyTeams = teams.filter(t => (!t.player1 || !t.player1.trim()) && (!t.player2 || !t.player2.trim()));
  if(emptyTeams.length === 0){ showToast('Tidak ada tim kosong'); return; }
  if(!confirm(`Hapus ${emptyTeams.length} tim yang belum diisi pemainnya?`)) return;
  await q(sb.from('teams').delete().in('id', emptyTeams.map(t => t.id)), `${emptyTeams.length} tim kosong dihapus`);
  renderGroupsTab();
});
}

/* =====================================================================
   TAB 6: JADWAL & SKOR FASE GRUP
===================================================================== */
async function renderMatchesTab(){
  const main = document.getElementById('mainContent');
  const groups = await q(sb.from('groups').select('*').order('sort_order')) || [];
  const teams = await q(sb.from('teams').select('*').order('sort_order')) || [];
  const matches = await q(sb.from('matches').select('*').eq('stage','group').order('match_order')) || [];

  main.innerHTML = `<div class="space-y-4" id="matchesWrap"></div>`;
  const wrap = document.getElementById('matchesWrap');
  if(groups.length === 0){
    wrap.innerHTML = '<div class="card p-5 shadow text-sm text-slate-400">Buat grup &amp; tim terlebih dahulu di tab "Grup & Tim".</div>';
    return;
  }

  groups.forEach(g => {
    const gTeams = teams.filter(t => t.group_id === g.id);
    const gMatches = matches.filter(m => m.group_id === g.id);
    const section = document.createElement('div');
    section.className = 'card p-5 shadow';
    section.innerHTML = `
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold">${esc(g.name)}</h3>
        <button class="add-match-btn text-blue-600 text-xs font-bold"><i class="fa-solid fa-plus mr-1"></i>Tambah Match</button>
      </div>
      ${gTeams.length < 2 ? '<p class="text-xs text-slate-400 mb-2">Tambahkan minimal 2 tim di grup ini untuk membuat pertandingan.</p>' : ''}
      <div class="space-y-2 match-list">
        ${gMatches.map(m => matchRowHtml(m, gTeams)).join('') || '<p class="text-sm text-slate-400">Belum ada jadwal.</p>'}
      </div>
    `;
    wrap.appendChild(section);

    section.querySelector('.add-match-btn').addEventListener('click', async () => {
      if(gTeams.length < 2){ showToast('Tambahkan minimal 2 tim dahulu'); return; }
      await q(sb.from('matches').insert({
        stage:'group', group_id:g.id, match_order:(gMatches.length+1),
        race_to: g.race_to || 2
      }), 'Match ditambahkan');
      renderMatchesTab();
    });
    bindMatchRowEvents(section);
  });
}
function matchRowHtml(m, teamOptions){
  const teamOpts = (sel) => teamOptions.map(t => `<option value="${t.id}" ${sel===t.id?'selected':''}>${esc(t.name)}</option>`).join('');
  const statusOpts = ['Scheduled','Live','Finished'].map(s => `<option value="${s}" ${(m.status||'Scheduled')===s?'selected':''}>${s}</option>`).join('');
  return `
    <div class="flex flex-wrap gap-2 items-center bg-slate-50 rounded-lg p-2" data-id="${m.id}">
      <select class="m-team1 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[110px]">
        <option value="">— pilih tim —</option>${teamOpts(m.team1_id)}
      </select>
      <input class="m-score1 w-14 px-2 py-1.5 rounded-lg border border-slate-200 text-sm text-center" type="number" min="0" value="${m.score1 ?? ''}">
      <span class="text-xs text-slate-400 font-bold">VS</span>
      <input class="m-score2 w-14 px-2 py-1.5 rounded-lg border border-slate-200 text-sm text-center" type="number" min="0" value="${m.score2 ?? ''}">
      <select class="m-team2 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[110px]">
        <option value="">— pilih tim —</option>${teamOpts(m.team2_id)}
      </select>
      <input class="m-time px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-28" type="time" value="${m.match_time ?? ''}" title="Jam Mulai">
      <input class="m-table px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-24" type="text" placeholder="No. Meja" value="${esc(m.table_number ?? '')}">
      <select class="m-status px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-28">${statusOpts}</select>
      <button class="m-save bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-check"></i></button>
      <button class="m-del bg-red-50 text-red-500 text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-trash"></i></button>
    </div>
  `;
}
function bindMatchRowEvents(section){
  section.querySelectorAll('.match-list > div').forEach(row => {
    const id = row.getAttribute('data-id');
    row.querySelector('.m-save').addEventListener('click', async () => {
      const s1 = row.querySelector('.m-score1').value;
      const s2 = row.querySelector('.m-score2').value;
      await q(sb.from('matches').update({
        team1_id: row.querySelector('.m-team1').value || null,
        team2_id: row.querySelector('.m-team2').value || null,
        score1: s1 === '' ? null : Number(s1),
        score2: s2 === '' ? null : Number(s2),
        match_time: row.querySelector('.m-time').value || null,
        table_number: row.querySelector('.m-table').value || null,
        status: row.querySelector('.m-status').value || 'Scheduled',
        updated_at: new Date().toISOString()
      }).eq('id', id), 'Hasil disimpan');
    });
    row.querySelector('.m-del').addEventListener('click', async () => {
      if(!confirm('Hapus match ini?')) return;
      await q(sb.from('matches').delete().eq('id', id), 'Match dihapus');
      renderMatchesTab();
    });
  });
}

/* =====================================================================
   TAB 7: BABAK GUGUR (QF / SF / FINAL)
===================================================================== */
const ROUND_DEFS = [
  { key:'qf', label:'8 Besar', defaultRace:3 },
  { key:'sf', label:'4 Besar', defaultRace:4 },
  { key:'final', label:'Final', defaultRace:5 },
];
async function renderBracketTab(){
  const main = document.getElementById('mainContent');
  const teams = await q(sb.from('teams').select('*').order('sort_order')) || [];
  main.innerHTML = `<div class="space-y-4" id="bracketWrap"></div>`;
  const wrap = document.getElementById('bracketWrap');

  for(const def of ROUND_DEFS){
    const rows = await q(sb.from('matches').select('*').eq('stage', def.key).order('match_order')) || [];
    const section = document.createElement('div');
    section.className = 'card p-5 shadow';
    section.innerHTML = `
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold">${def.label}</h3>
        <button class="add-elim-btn text-blue-600 text-xs font-bold"><i class="fa-solid fa-plus mr-1"></i>Tambah Match</button>
      </div>
      <div class="space-y-2 elim-list">
        ${rows.map(m => elimRowHtml(m, teams)).join('') || '<p class="text-sm text-slate-400">Belum ada match.</p>'}
      </div>
    `;
    wrap.appendChild(section);

    section.querySelector('.add-elim-btn').addEventListener('click', async () => {
      await q(sb.from('matches').insert({ stage:def.key, match_order:(rows.length+1), race_to:def.defaultRace }), 'Match ditambahkan');
      renderBracketTab();
    });
    section.querySelectorAll('.elim-list > div').forEach(row => {
      const id = row.getAttribute('data-id');
      row.querySelector('.e-save').addEventListener('click', async () => {
        const s1 = row.querySelector('.e-score1').value;
        const s2 = row.querySelector('.e-score2').value;
        await q(sb.from('matches').update({
          team1_id: row.querySelector('.e-team1').value || null,
          team2_id: row.querySelector('.e-team2').value || null,
          team1_label: row.querySelector('.e-label1').value,
          team2_label: row.querySelector('.e-label2').value,
          race_to: Number(row.querySelector('.e-race').value) || def.defaultRace,
          score1: s1 === '' ? null : Number(s1),
          score2: s2 === '' ? null : Number(s2),
          match_time: row.querySelector('.e-time').value || null,
          table_number: row.querySelector('.e-table').value || null,
          status: row.querySelector('.e-status').value || 'Scheduled',
          updated_at: new Date().toISOString()
        }).eq('id', id), 'Match disimpan');
      });
      row.querySelector('.e-del').addEventListener('click', async () => {
        if(!confirm('Hapus match ini?')) return;
        await q(sb.from('matches').delete().eq('id', id), 'Match dihapus');
        renderBracketTab();
      });
    });
  }
}
function elimRowHtml(m, teamOptions){
  const teamOpts = (sel) => `<option value="">— pilih tim (kosongkan jika pakai label) —</option>` +
    teamOptions.map(t => `<option value="${t.id}" ${sel===t.id?'selected':''}>${esc(t.name)}</option>`).join('');
  const statusOpts = ['Scheduled','Live','Finished'].map(s => `<option value="${s}" ${(m.status||'Scheduled')===s?'selected':''}>${s}</option>`).join('');
  return `
    <div class="border border-slate-200 rounded-lg p-3 space-y-2" data-id="${m.id}">
      <div class="flex flex-wrap gap-2 items-center">
        <select class="e-team1 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[130px]">${teamOpts(m.team1_id)}</select>
        <input class="e-label1 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[110px]" placeholder="atau label, mis. 'Juara Grup 1'" value="${esc(m.team1_label)}">
        <input class="e-score1 w-14 px-2 py-1.5 rounded-lg border border-slate-200 text-sm text-center" type="number" min="0" value="${m.score1 ?? ''}">
      </div>
      <div class="flex flex-wrap gap-2 items-center">
        <select class="e-team2 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[130px]">${teamOpts(m.team2_id)}</select>
        <input class="e-label2 px-2 py-1.5 rounded-lg border border-slate-200 text-sm flex-1 min-w-[110px]" placeholder="atau label, mis. 'Runner-up Grup 2'" value="${esc(m.team2_label)}">
        <input class="e-score2 w-14 px-2 py-1.5 rounded-lg border border-slate-200 text-sm text-center" type="number" min="0" value="${m.score2 ?? ''}">
      </div>
      <div class="flex flex-wrap gap-2 items-center">
        <input class="e-time px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-28" type="time" value="${m.match_time ?? ''}" title="Jam Mulai">
        <input class="e-table px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-24" type="text" placeholder="No. Meja" value="${esc(m.table_number ?? '')}">
        <select class="e-status px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-28">${statusOpts}</select>
      </div>
      <div class="flex flex-wrap gap-2 items-center justify-between pt-1">
        <label class="text-xs text-slate-500 flex items-center gap-1.5">Race to
          <input class="e-race w-16 px-2 py-1 rounded-lg border border-slate-200 text-sm text-center" type="number" min="1" value="${m.race_to}">
        </label>
        <div class="flex gap-2">
          <button class="e-save bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-check"></i> Simpan</button>
          <button class="e-del bg-red-50 text-red-500 text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
    </div>
  `;
}
/* =====================================================================
   TAB 8: GALERI FOTO
===================================================================== */
async function renderGalleryTab(){
  const main = document.getElementById('mainContent');
  const rows = await q(sb.from('gallery').select('*').order('event_date', { ascending:false }).order('sort_order')) || [];
  main.innerHTML = `
    <div class="card p-5 md:p-6 shadow">
      <h2 class="font-bold text-lg mb-1">Galeri Foto</h2>
      <p class="text-sm text-slate-500 mb-5">Unggah foto dokumentasi turnamen per hari.</p>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="galleryList">
        ${rows.map(g => galleryRowHtml(g)).join('') || '<p class="text-sm text-slate-400">Belum ada foto.</p>'}
      </div>
      <button id="addGalleryBtn" class="mt-4 border-2 border-dashed border-slate-200 hover:border-blue-400 text-slate-500 hover:text-blue-600 font-bold text-sm px-5 py-2.5 rounded-lg w-full">
        <i class="fa-solid fa-plus mr-2"></i>Tambah Foto
      </button>
    </div>
  `;
  bindGalleryEvents();
  document.getElementById('addGalleryBtn').addEventListener('click', async () => {
    await q(sb.from('gallery').insert({ image_url:'', caption:'', event_date:null, sort_order:(rows.length+1) }), 'Foto ditambahkan');
    renderGalleryTab();
  });
}
function galleryRowHtml(g){
  return `
    <div class="border border-slate-200 rounded-xl p-3 flex flex-col gap-2" data-id="${g.id}">
      <div class="w-full h-32 rounded-lg bg-slate-100 overflow-hidden cursor-pointer gal-img" title="Klik untuk unggah foto">
        ${g.image_url ? `<img src="${esc(g.image_url)}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-image text-xl"></i></div>`}
      </div>
      <input class="gal-caption px-3 py-2 rounded-lg border border-slate-200 text-sm" placeholder="Keterangan foto" value="${esc(g.caption)}">
      <div class="flex flex-wrap gap-2 items-center">
        <input class="gal-date px-3 py-2 rounded-lg border border-slate-200 text-sm" type="date" value="${g.event_date ?? ''}">
        <input class="gal-order px-3 py-2 rounded-lg border border-slate-200 text-sm w-20" type="number" placeholder="Urutan" value="${g.sort_order ?? 0}">
        <button class="gal-save bg-blue-600 text-white text-xs font-bold px-3 py-2 rounded-lg ml-auto"><i class="fa-solid fa-check"></i></button>
        <button class="gal-del bg-red-50 text-red-500 text-xs font-bold px-3 py-2 rounded-lg"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
  `;
}
function bindGalleryEvents(){
  document.querySelectorAll('#galleryList > div').forEach(row => {
    const id = row.getAttribute('data-id');
    row.querySelector('.gal-img').addEventListener('click', async () => {
      const url = await pickImage();
      if(url){ await q(sb.from('gallery').update({ image_url:url }).eq('id', id), 'Foto disimpan'); renderGalleryTab(); }
    });
    row.querySelector('.gal-save').addEventListener('click', async () => {
      await q(sb.from('gallery').update({
        caption: row.querySelector('.gal-caption').value,
        event_date: row.querySelector('.gal-date').value || null,
        sort_order: Number(row.querySelector('.gal-order').value) || 0
      }).eq('id', id), 'Foto disimpan');
    });
    row.querySelector('.gal-del').addEventListener('click', async () => {
      if(!confirm('Hapus foto ini?')) return;
      await q(sb.from('gallery').delete().eq('id', id), 'Foto dihapus');
      renderGalleryTab();
    });
  });
}
</script>
